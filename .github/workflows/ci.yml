name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: astro/package-lock.json

      - name: Install
        working-directory: astro
        run: npm ci

      - name: Sync static assets into public/
        run: bash astro/sync-public.sh

      - name: Build
        working-directory: astro
        run: npm run build

      - name: Lint built site (links, titles, anti-IA)
        working-directory: astro
        run: python3 lint.py dist
