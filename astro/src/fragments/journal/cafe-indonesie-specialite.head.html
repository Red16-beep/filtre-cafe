          "name": "C'est quoi le giling basah ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le giling basah est une méthode de traitement du café propre à l'Indonésie. Après dépulpage et courte fermentation, le parchemin est retiré alors que le grain est encore très humide — à environ 40 % d'humidité — au lieu d'attendre qu'il soit sec. Le grain nu est ensuite séché directement. Ce procédé, né des contraintes climatiques de l'archipel (humidité élevée, absence de longue saison sèche), est responsable du profil terreux, boisé, au corps très dense et à l'acidité basse qui caractérise la plupart des cafés sumatranais et sulawésiens."
          }
        },
        {
          "@type": "Question",
          "name": "Quelle est la différence entre un Sumatra et un Java ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un Sumatra (Gayo, Mandheling, Lintong) est traité en giling basah : profil terreux, boisé, corps très dense, acidité basse, notes de tabac et d'épices. Un Java de spécialité, en revanche, est traité en lavé complet sur les domaines d'État du plateau d'Ijen (Blawan, Jampit, Kayumas) : profil propre, chocolaté, notes de fruits à noyau, corps solide mais sans le côté terreux sumatranais. Ce sont deux familles aromatiques radicalement différentes, malgré le pays d'origine commun."
          }
        },
        {
          "@type": "Question",
          "name": "Pourquoi l'Indonésie produit-elle autant de robusta ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La rouille du caféier (Hemileia vastatrix) a touché Sumatra dès 1876 et Java en 1878, dévastant les plantations d'arabica néerlandaises. Après avoir tenté le Liberica comme remplacement, les Hollandais introduisent le robusta (Coffea canephora) à Java dès 1907 : résistant à la rouille, haut rendement, altitude basse. La conversion est massive. Aujourd'hui, l'Indonésie produit environ 85 à 90 % de robusta — principalement en Sumatra du Sud et à Lampung — et seulement 10 à 14 % d'arabica, cultivé en altitude sur les hauts plateaux."
          }
