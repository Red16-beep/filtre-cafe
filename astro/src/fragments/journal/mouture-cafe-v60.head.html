          "name": "Quelle mouture pour le V60 ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La mouture pour le V60 est médium-fine : plus fine que pour la cafetière à piston, plus grossière que pour l'espresso. En visuel, pensez sucre semoule fin ou sable de plage. Le repère principal n'est pas la taille en elle-même mais le temps de débit : l'extraction doit être terminée entre 2 min 30 et 3 min 30 pour 15 g de café et 250 g d'eau. Si ça coule plus vite, serrez. Si ça coule plus lentement, desserrez."
          }

          "@type": "Question",
          "name": "Comment savoir si ma mouture V60 est trop fine ou trop grossière ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le débit est votre indicateur principal. Trop fine : le débit est très lent (plus de 4 minutes), le café goutte, le lit reste saturé longtemps — résultat amer, astringent. Trop grossière : le débit est rapide (moins de 2 minutes), l'eau passe facilement — résultat plat, acide, aqueux. Dans la fenêtre (2:30 à 3:30) : l'extraction est équilibrée. Ajustez la mouture en premier avant de toucher à la température ou au versement."
          }
        },

          "@type": "Question",
          "name": "Est-ce que la mouture change selon le café utilisé ?",

            "@type": "Answer",
            "text": "Oui. La densité du grain varie selon l'altitude, le traitement et la torréfaction. Un café éthiopien lavé torréfié clair est dense et résiste bien à l'extraction — il tolère une mouture légèrement plus fine. Un naturel brésilien torréfié médium est moins dense — il extrait plus facilement, demandant parfois une mouture légèrement plus grossière. Règle pratique : partez de votre réglage habituel et ajustez selon le débit, pas selon l'origine."
          }
