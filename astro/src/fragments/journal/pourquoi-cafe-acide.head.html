            "@type": "Answer",
            "text": "Un café sous-extrait se reconnaît à plusieurs signes : acidité pointue et agressive (pas vive et agréable), manque de corps et de texture en bouche, fin de tasse creuse et courte, couleur claire dans la tasse, absence de douceur ou de sucrosité perceptible. L'acidité d'un café sous-extrait est déséquilibrée, elle n'est pas soutenue par le reste du profil aromatique. C'est le contraire d'un bon café éthiopien naturel dont l'acidité est encadrée par des notes fruitées et une texture généreuse."
