<script>
function toggleMobileMenu() {
  const menu = document.getElementById('mobile-menu');
  const h1 = document.getElementById('ham-1');
  const h2 = document.getElementById('ham-2');
  const h3 = document.getElementById('ham-3');
  const isOpen = menu.classList.contains('open');
  if (isOpen) {
    menu.classList.remove('open');
    h1.style.transform = ''; h2.style.opacity = ''; h3.style.transform = '';
  } else {
    menu.classList.add('open');
    h1.style.transform = 'translateY(6px) rotate(45deg)';
    h2.style.opacity = '0';
    h3.style.transform = 'translateY(-6px) rotate(-45deg)';
  }
}
function closeMobileMenu() {
  const menu = document.getElementById('mobile-menu');
  if (menu.classList.contains('open')) toggleMobileMenu();
}

async function subscribe(e, suffix) {
  e.preventDefault();
  const email   = document.getElementById(`nl-email-${suffix}`).value.trim();
  const btn     = document.getElementById(`nl-btn-${suffix}`);
  const btnText = document.getElementById(`nl-btext-${suffix}`);
  const spinner = document.getElementById(`nl-spin-${suffix}`);
  const ok      = document.getElementById(`nl-ok-${suffix}`);
  const err     = document.getElementById(`nl-err-${suffix}`);

  err.classList.add('hidden'); err.textContent = '';
  btnText.textContent = '';
  spinner.classList.remove('hidden');
  btn.disabled = true;

  try {
    const res = await fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || `Erreur ${res.status}`);
    }
    document.getElementById(`nl-form-${suffix}`).classList.add('hidden');
    ok.classList.remove('hidden');
  } catch (ex) {
    err.textContent = 'Une erreur est survenue. Réessayez dans un moment.';
    err.classList.remove('hidden');
    spinner.classList.add('hidden');
    btnText.textContent = "S'inscrire";
    btn.disabled = false;
  }
}
</script>
